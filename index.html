<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3a7c29" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="YumYums" />
    <title>YumYums – Vegetarian Meal Planner</title>
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('yumyums-theme');
          var state = raw ? JSON.parse(raw).state : null;
          var mode = (state && state.colorMode) || 'system';
          var isDark = mode === 'dark' || (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          var root = document.documentElement;
          root.classList.toggle('dark', isDark);
          root.dataset.contrast = state && state.highContrast ? 'high' : 'normal';
          root.dataset.colorTheme = (state && state.colorTheme) || 'green';
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
